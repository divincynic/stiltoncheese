<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stilton PDO Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #120f0a; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
    canvas { display: block; }
    #hud {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; display: flex; flex-direction: column;
      justify-content: space-between; padding: 22px;
    }
    #title-block h1 { font-size: 21px; font-weight: 500; color: #f0e8d0; margin-bottom: 5px; }
    #title-block p  { font-size: 13px; color: rgba(240,232,208,0.55); line-height: 1.55; max-width: 310px; }
    #bottom-row { display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; }
    #hint {
      font-size: 12px; color: rgba(240,232,208,0.45);
      background: rgba(12,9,5,0.65); border-radius: 6px; padding: 8px 13px;
      border-left: 2px solid rgba(230,200,100,0.35);
    }
    #log {
      background: rgba(12,9,5,0.88); border: 0.5px solid rgba(240,210,140,0.18);
      border-radius: 10px; padding: 15px 18px; min-width: 215px;
    }
    .log-title { font-size: 10px; font-weight: 500; color: rgba(230,200,100,0.65); text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 9px; }
    .stat { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .sl { font-size: 12px; color: rgba(240,232,208,0.48); }
    .sv { font-size: 13px; font-weight: 500; color: #f0e8d0; }
    .sv.v { color: #3d9e72; }
    #bio { font-size: 12px; color: rgba(80,190,140,0.9); margin-top: 9px; line-height: 1.6; min-height: 40px; white-space: pre-line; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="title-block">
    <h1>&#129472; Stilton PDO Simulator</h1>
    <p>Blue Stilton — Derbyshire, Leicestershire &amp; Nottinghamshire.<br>Pierce to introduce O&#8322; and activate <em>Penicillium roqueforti</em>.</p>
  </div>
  <div id="bottom-row">
    <div id="hint">&#127919; Click the cheese to pierce with stainless steel needles</div>
    <div id="log">
      <div class="log-title">Biochemistry Log</div>
      <div class="stat"><span class="sl">Piercings</span><span class="sv" id="pv">0</span></div>
      <div class="stat"><span class="sl">Vein clusters</span><span class="sv v" id="vv">0</span></div>
      <div class="stat"><span class="sl">Maturation</span><span class="sv" id="mv">0%</span></div>
      <div id="bio">Status: maturing in cave...</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x120f0a);
scene.fog = new THREE.Fog(0x120f0a, 12, 28);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(5.2, 4.2, 6.0);
camera.lookAt(0, 0.4, 0);

// ── Lighting ───────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xfff0d8, 0.28));

const sun = new THREE.DirectionalLight(0xfffae8, 2.4);
sun.position.set(5, 9, 4);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left = -6; sun.shadow.camera.right = 6;
sun.shadow.camera.top = 6; sun.shadow.camera.bottom = -6;
sun.shadow.bias = -0.0003;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xc8dff8, 0.45);
fill.position.set(-6, 2, -2);
scene.add(fill);

const back = new THREE.DirectionalLight(0xffe8c8, 0.6);
back.position.set(0, 3, -8);
scene.add(back);

// ── Table ──────────────────────────────────────────────────────
(function(){
  const g = new THREE.PlaneGeometry(40,40);
  const m = new THREE.MeshStandardMaterial({color:0x1e1508, roughness:0.97, metalness:0});
  const t = new THREE.Mesh(g,m);
  t.rotation.x = -Math.PI/2;
  t.position.y = -0.86;
  t.receiveShadow = true;
  scene.add(t);
})();

// ── Procedural Textures ───────────────────────────────────────
function makePaste(){
  const sz=1024, cv=document.createElement('canvas');
  cv.width=cv.height=sz;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#ede5cb'; ctx.fillRect(0,0,sz,sz);
  for(let i=0;i<120;i++){
    const x=Math.random()*sz, y=Math.random()*sz;
    const r=20+Math.random()*60;
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    const light=Math.random()>0.5;
    g.addColorStop(0, light?'rgba(255,252,238,0.18)':'rgba(195,182,155,0.14)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  for(let i=0;i<8000;i++){
    const x=Math.random()*sz, y=Math.random()*sz;
    const r=Math.random()*1.8+0.2;
    const a=Math.random()*0.2+0.04;
    ctx.fillStyle=Math.random()>0.55?`rgba(255,250,235,${a})`:`rgba(175,160,130,${a})`;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  return new THREE.CanvasTexture(cv);
}

function makeRind(){
  const sz=512, cv=document.createElement('canvas');
  cv.width=cv.height=sz;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#6b3d18'; ctx.fillRect(0,0,sz,sz);
  for(let i=0;i<600;i++){
    const x=Math.random()*sz, y=Math.random()*sz;
    const r=Math.random()*6+1;
    const v=Math.random();
    ctx.fillStyle=v>0.65?'rgba(160,90,30,0.5)':v>0.35?'rgba(80,40,10,0.45)':'rgba(200,120,50,0.35)';
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  return new THREE.CanvasTexture(cv);
}

// ── TRANSLUCENT PASTE MATERIAL ─────────────────────────────────
// Using MeshPhysicalMaterial with transmission for realistic cheese subsurface scattering
const pasteTex = makePaste();
const pasteMat = new THREE.MeshPhysicalMaterial({ 
  color: 0xf5ecd8,
  map: pasteTex,
  roughness: 0.65,
  metalness: 0,
  transmission: 0.6,        // Allow light through for subsurface effect
  thickness: 2.5,           // Volume thickness for scattering
  ior: 1.35,                // Index of refraction for fatty cheese
  clearcoat: 0.1,
  clearcoatRoughness: 0.4,
  attenuationTint: 0xfff8e8,
  attenuationDistance: 1.2,
  side: THREE.FrontSide
});

const rindMat = new THREE.MeshStandardMaterial({ 
  color: 0x7a4820, 
  map: makeRind(), 
  roughness: 0.94,
  bumpScale: 0.02
});

// ── Cheese Model Integration ──────────────────────────────────
const R = 2.3, HH = 1.75, ANGLE = Math.PI/3;
let bodyMesh; 
const cheeseGroup = new THREE.Group();
scene.add(cheeseGroup);

const loader = new THREE.GLTFLoader();

loader.load('models/cheese.glb', (gltf) => {
  const model = gltf.scene;
  
  model.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;

      if (child.name.toLowerCase().includes('rind')) {
        child.material = rindMat; 
      } else {
        child.material = pasteMat;
        bodyMesh = child;
      }
    }
  });

  cheeseGroup.add(model);
}, undefined, (e) => console.error("Error loading GLB:", e));

// ── NEEDLE SYSTEM ──────────────────────────────────────────────
const needles = [];
const needleGroup = new THREE.Group();
scene.add(needleGroup);

const needleMat = new THREE.MeshStandardMaterial({
  color: 0xc0c5ce,
  metalness: 0.95,
  roughness: 0.15,
  envMapIntensity: 1.0
});

function createNeedle(position, direction) {
  // Needle shaft
  const shaftGeo = new THREE.CylinderGeometry(0.015, 0.01, 0.8, 8);
  const shaft = new THREE.Mesh(shaftGeo, needleMat);
  
  // Needle tip (cone)
  const tipGeo = new THREE.ConeGeometry(0.01, 0.15, 8);
  const tip = new THREE.Mesh(tipGeo, needleMat);
  tip.position.y = -0.475;
  
  // Combine
  const needle = new THREE.Group();
  needle.add(shaft);
  needle.add(tip);
  
  // Position and orient
  needle.position.copy(position);
  
  // Orient needle to point in piercing direction (inward and slightly down)
  const targetPos = position.clone().add(direction);
  needle.lookAt(targetPos);
  needle.rotateX(Math.PI/2); // Adjust for cylinder orientation
  
  // Animate insertion
  needle.position.add(direction.clone().multiplyScalar(-0.3)); // Start outside
  needle.userData = { 
    targetPos: position.clone(),
    startPos: needle.position.clone(),
    progress: 0,
    inserted: false
  };
  
  needleGroup.add(needle);
  needles.push(needle);
  return needle;
}

// ── Vein system ────────────────────────────────────────────────
let pierceCount=0, veinCount=0;
const veinAnims = [];

const trunkMat = new THREE.MeshStandardMaterial({
  color:0x1a5060, 
  emissive:0x0a2028, 
  emissiveIntensity:0.6,
  roughness:0.35, 
  metalness:0.1,
  transparent: true,
  opacity: 0.9
});

const branchMat2 = new THREE.MeshStandardMaterial({
  color:0x0d3a45, 
  emissive:0x051015, 
  emissiveIntensity:0.4,
  roughness:0.4, 
  metalness:0.05
});

function clampToWedge(p){
  const horiz = Math.sqrt(p.x*p.x + p.z*p.z);
  if(horiz > R-0.15){
    const scale = (R-0.15)/horiz;
    p.x *= scale; p.z *= scale;
  }
  let theta = Math.atan2(p.z, p.x);
  if(theta < 0.05) theta = 0.05;
  if(theta > ANGLE-0.05) theta = ANGLE-0.05;
  const hr2 = Math.sqrt(p.x*p.x+p.z*p.z);
  p.x = Math.cos(theta)*hr2;
  p.z = Math.sin(theta)*hr2;
  p.y = Math.max(-HH/2+0.1, Math.min(HH/2-0.1, p.y));
  return p;
}

function randInsideWedge(nearPt, spread){
  for(let tries=0;tries<20;tries++){
    const p = new THREE.Vector3(
      nearPt.x + (Math.random()-0.5)*spread,
      nearPt.y + (Math.random()-0.5)*spread*0.5,
      nearPt.z + (Math.random()-0.5)*spread
    );
    clampToWedge(p);
    const horiz = Math.sqrt(p.x*p.x+p.z*p.z);
    const theta = Math.atan2(p.z, p.x);
    if(horiz < R-0.1 && theta > 0.02 && theta < ANGLE-0.02) return p;
  }
  return clampToWedge(nearPt.clone());
}

function spawnVein(localPt){
  clampToWedge(localPt);
  const origin = new THREE.Vector3(
    localPt.x * (0.05 + Math.random()*0.2),
    localPt.y * (0.1 + Math.random()*0.3),
    localPt.z * (0.05 + Math.random()*0.2)
  );
  clampToWedge(origin);

  const grp = new THREE.Group();
  const pts = [origin.clone()];
  const steps = 10;
  for(let i=1;i<=steps;i++){
    const t = i/steps;
    const base = origin.clone().lerp(localPt, t);
    base.x += (Math.random()-0.5)*0.2;
    base.y += (Math.random()-0.5)*0.1;
    clampToWedge(base);
    pts.push(base);
  }
  const curve = new THREE.CatmullRomCurve3(pts);
  const tgeo = new THREE.TubeGeometry(curve, 20, 0.025, 6, false);
  const veinMesh = new THREE.Mesh(tgeo, trunkMat);
  
  // Add slight glow to veins for visibility through cheese
  veinMesh.renderOrder = 1;
  
  grp.add(veinMesh);
  grp.scale.setScalar(0.01);
  cheeseGroup.add(grp);
  veinAnims.push({grp, s:0.01, target:1.0, done:false});
  veinCount++;
}

// ── Raycasting & Interaction ───────────────────────────────────
const rc=new THREE.Raycaster();
const mouse=new THREE.Vector2();

document.addEventListener('pointerdown',function(e){
  if(!bodyMesh) return;
  const rect=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  rc.setFromCamera(mouse,camera);
  const hits=rc.intersectObject(bodyMesh);
  if(hits.length>0){
    const wp=hits[0].point.clone();
    const lp=cheeseGroup.worldToLocal(wp.clone());
    
    // Create needle piercing inward
    const normal = hits[0].face.normal.clone().transformDirection(bodyMesh.matrixWorld).normalize();
    const pierceDir = normal.multiplyScalar(-1); // Inward direction
    
    createNeedle(wp, pierceDir);
    spawnVein(lp);
    pierceCount++;
    hud();
    updateBio();
  }
});

function hud(){
  document.getElementById('pv').textContent=pierceCount;
  document.getElementById('vv').textContent=veinCount;
  const pct=Math.min(100,Math.round(pierceCount*9+veinCount*2));
  document.getElementById('mv').textContent=pct+'%';
}

function updateBio(){
  const msgs = [
    "Status: Introducing oxygen channels...",
    "Penicillium roqueforti activating...",
    "Proteolysis initiated...",
    "Lipolysis releasing free fatty acids...",
    "Blue-green marbling developing...",
    "Texture softening in progress...",
    "Earthy aroma compounds forming..."
  ];
  const idx = Math.min(msgs.length-1, Math.floor(pierceCount/2));
  document.getElementById('bio').textContent = msgs[idx];
}

// ── Animation Loop ─────────────────────────────────────────────
const clk=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt=clk.getDelta();
  
  // Animate needle insertions
  needles.forEach(needle => {
    if(!needle.userData.inserted && needle.userData.progress < 1){
      needle.userData.progress += dt * 3; // Insertion speed
      if(needle.userData.progress >= 1){
        needle.userData.progress = 1;
        needle.userData.inserted = true;
      }
      // Lerp position
      needle.position.lerpVectors(
        needle.userData.startPos,
        needle.userData.targetPos,
        needle.userData.progress
      );
    }
  });
  
  // Animate vein growth
  for(const v of veinAnims){
    if(!v.done){
      v.s=Math.min(v.target, v.s+dt*1.2);
      v.grp.scale.setScalar(v.s);
      if(v.s>=v.target) v.done=true;
    }
  }
  
  // Gentle idle rotation
  if(cheeseGroup){
    cheeseGroup.rotation.y = Math.sin(clk.getElapsedTime() * 0.1) * 0.05;
  }
  
  renderer.render(scene,camera);
}

window.addEventListener('resize',function(){
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
})();
</script>
</body>
</html>
