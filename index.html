<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stilton PDO Simulator</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #120f0a; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
canvas { display: block; }
#hud {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; display: flex; flex-direction: column;
  justify-content: space-between; padding: 22px;
}
#title-block h1 { font-size: 21px; color: #f0e8d0; }
#title-block p  { font-size: 13px; color: rgba(240,232,208,0.55); }
#bottom-row { display: flex; justify-content: space-between; }
#hint {
  font-size: 12px;
  background: rgba(12,9,5,0.65);
  padding: 8px 13px;
  border-left: 2px solid rgba(230,200,100,0.35);
}
#log {
  background: rgba(12,9,5,0.88);
  padding: 15px;
}
</style>
</head>

<body>
<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<script>
const canvas = document.getElementById('c');

const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x120f0a);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(5,4,6);

// lights
scene.add(new THREE.AmbientLight(0xfff0d8,0.4));

const light = new THREE.DirectionalLight(0xffffff,2);
light.position.set(5,10,5);
light.castShadow = true;
scene.add(light);

// table
const table = new THREE.Mesh(
  new THREE.PlaneGeometry(40,40),
  new THREE.MeshStandardMaterial({color:0x1e1508})
);
table.rotation.x = -Math.PI/2;
table.position.y = -1;
scene.add(table);

// ── LOAD MODEL ─────────────────────────────────
let cheeseModel;
const loader = new THREE.GLTFLoader();
const box = new THREE.Box3();

loader.load('models/cheese.glb', (gltf)=>{

  cheeseModel = gltf.scene;

  cheeseModel.scale.set(2.2,2.2,2.2);

  // 🎨 COLORING (important)
  cheeseModel.traverse((child)=>{
    if(child.isMesh){

      child.castShadow = true;
      child.receiveShadow = true;

      // KEEP texture if exists but tint it
      if(child.material.map){
        child.material.color.set(0xf2e8c9);
      } else {
        child.material = new THREE.MeshStandardMaterial({
          color:0xf2e8c9,
          roughness:0.85
        });
      }

      // subtle variation
      child.material.color.offsetHSL(0,0,Math.random()*0.05);
    }
  });

  scene.add(cheeseModel);
  box.setFromObject(cheeseModel);

});

// ── VEINS ──────────────────────────────────────
let pierceCount=0;
let veinCount=0;
const veinAnims=[];

const veinMat = new THREE.MeshStandardMaterial({
  color:0x1a5060,
  emissive:0x061418,
  emissiveIntensity:0.6,
  roughness:0.4
});

function clamp(p){
  return p.clamp(box.min.clone(), box.max.clone());
}

function spawnVein(point, normal){

  const origin = point.clone().add(normal.clone().multiplyScalar(-0.3));
  clamp(origin);

  const pts=[origin];

  for(let i=1;i<12;i++){
    const p = origin.clone().add(normal.clone().multiplyScalar(-i*0.3));

    p.x += (Math.random()-0.5)*0.25;
    p.y += (Math.random()-0.5)*0.2;
    p.z += (Math.random()-0.5)*0.25;

    clamp(p);
    pts.push(p);
  }

  const curve = new THREE.CatmullRomCurve3(pts);

  const geo = new THREE.TubeGeometry(curve,40,0.02,8,false);
  const mesh = new THREE.Mesh(geo, veinMat);

  const grp = new THREE.Group();
  grp.add(mesh);
  grp.scale.setScalar(0.01);

  cheeseModel.add(grp);

  veinAnims.push({grp,s:0.01,target:1});
  veinCount++;
}

// ── CLICK ──────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

document.addEventListener('pointerdown',(e)=>{
  if(!cheeseModel) return;

  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;

  raycaster.setFromCamera(mouse,camera);

  const hits = raycaster.intersectObject(cheeseModel,true);
  if(!hits.length) return;

  const hit = hits[0];

  const point = hit.point.clone();
  const normal = hit.face.normal.clone().transformDirection(hit.object.matrixWorld);

  const local = cheeseModel.worldToLocal(point.clone());

  spawnVein(local, normal);

  pierceCount++;
});

// ── ANIMATION ─────────────────────────────────
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);

  const dt = clock.getDelta();

  if(cheeseModel){
    cheeseModel.rotation.y += 0.003;
  }

  for(const v of veinAnims){
    if(v.s < v.target){
      v.s += dt*1.5;
      v.grp.scale.setScalar(v.s);
    }
  }

  renderer.render(scene,camera);
}

animate();

// resize
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
